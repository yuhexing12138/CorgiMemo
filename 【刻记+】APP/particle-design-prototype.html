<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刻记⁺ 场景粒子设计原型</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.2/lib/p5.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ========== 全局样式 ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Nunito Sans', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    /* ========== 标题区域 ========== */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF6B35, #FFD700, #7EC8A0, #60A5FA, #C084FC);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease infinite;
      letter-spacing: 2px;
    }

    .header .subtitle {
      font-size: 1.1rem;
      font-weight: 300;
      color: #888;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ========== 网格布局 ========== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ========== 面板卡片 ========== */
    .panel {
      border-radius: 16px;
      overflow: hidden;
      background: rgba(30, 30, 30, 0.9);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .panel:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1.5px;
      background: linear-gradient(135deg, var(--glow-color, #FF6B35), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.6;
    }

    .panel canvas {
      display: block;
      width: 100%;
      height: 280px;
    }

    .panel .label {
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(20, 20, 20, 0.8);
    }

    .panel .label .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--glow-color, #FF6B35);
      box-shadow: 0 0 8px var(--glow-color, #FF6B35);
      flex-shrink: 0;
    }

    .panel .label .theme-id {
      font-size: 0.75rem;
      font-weight: 400;
      color: #666;
      margin-left: auto;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 768px) {
      .header h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; gap: 20px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>刻记⁺ 场景粒子设计原型</h1>
    <p class="subtitle">11种面板主题 × 流场驱动有机粒子</p>
  </div>

  <div class="grid" id="grid"></div>

  <script>
  /* ================================================================
   *  刻记⁺ 场景粒子设计原型
   *  11种主题 × p5.js 实例模式
   * ================================================================ */

  // ---- 主题配置 ----
  const THEMES = [
    {
      id: 'outfit-traditional',
      name: '传统节日',
      colors: ['#FF6B35', '#FFD4A8', '#FF4444'],
      glow: '#FF6B35',
      seed: 101,
      noiseScale: 0.008,
      speed: 0.6,
      count: 60,
      sizeRange: [8, 20],
      trail: 'glow'
    },
    {
      id: 'outfit-modern',
      name: '现代节日',
      colors: ['#FF6B9D', '#C084FC', '#60A5FA'],
      glow: '#FF6B9D',
      seed: 202,
      noiseScale: 0.012,
      speed: 1.0,
      count: 80,
      sizeRange: [4, 10],
      trail: 'sparkle'
    },
    {
      id: 'outfit-solar',
      name: '节气',
      colors: ['#7EC8A0', '#A8E6CF', '#FFE082'],
      glow: '#7EC8A0',
      seed: 303,
      noiseScale: 0.005,
      speed: 0.3,
      count: 50,
      sizeRange: [6, 14],
      trail: 'petal'
    },
    {
      id: 'outfit-season',
      name: '季节',
      colors: ['#FFB7C5', '#FFD700', '#D2691E', '#B0E0E6'],
      glow: '#FFB7C5',
      seed: 404,
      noiseScale: 0.006,
      speed: 0.5,
      count: 55,
      sizeRange: [5, 12],
      trail: 'wispy'
    },
    {
      id: 'outfit-weather',
      name: '天气',
      colors: ['#87CEEB', '#708090', '#FFD700'],
      glow: '#87CEEB',
      seed: 505,
      noiseScale: 0.01,
      speed: 0.8,
      count: 70,
      sizeRange: [3, 8],
      trail: 'streak'
    },
    {
      id: 'outfit-daily',
      name: '日常',
      colors: ['#FFA07A', '#FFD700', '#9370DB', '#4169E1'],
      glow: '#FFA07A',
      seed: 606,
      noiseScale: 0.004,
      speed: 0.25,
      count: 40,
      sizeRange: [10, 25],
      trail: 'none'
    },
    {
      id: 'corgi-posture',
      name: '柯基姿态',
      colors: ['#FF6B35', '#FFD4A8', '#FFFFFF'],
      glow: '#FF6B35',
      seed: 707,
      noiseScale: 0.007,
      speed: 0.5,
      count: 35,
      sizeRange: [8, 16],
      trail: 'dotted'
    },
    {
      id: 'corgi-expression',
      name: '柯基表情',
      colors: ['#FF69B4', '#FFB6C1', '#FFFFFF'],
      glow: '#FF69B4',
      seed: 808,
      noiseScale: 0.005,
      speed: 0.35,
      count: 45,
      sizeRange: [6, 14],
      trail: 'heart'
    },
    {
      id: 'corgi-emotion',
      name: '柯基情绪',
      colors: ['#FF6B35', '#7EC8A0', '#FFD700'],
      glow: '#FF6B35',
      seed: 909,
      noiseScale: 0.009,
      speed: 0.6,
      count: 50,
      sizeRange: [5, 12],
      trail: 'ring'
    },
    {
      id: 'corgi-growth',
      name: '柯基成长',
      colors: ['#7EC8A0', '#90EE90', '#FFD700'],
      glow: '#7EC8A0',
      seed: 1010,
      noiseScale: 0.004,
      speed: 0.2,
      count: 35,
      sizeRange: [6, 18],
      trail: 'line'
    },
    {
      id: 'corgi-achievement',
      name: '柯基成就',
      colors: ['#FFD700', '#FFA500', '#FFFFFF'],
      glow: '#FFD700',
      seed: 1111,
      noiseScale: 0.008,
      speed: 0.7,
      count: 45,
      sizeRange: [6, 15],
      trail: 'sparkle'
    }
  ];

  // ---- 工具函数：十六进制颜色转 RGBA 字符串 ----
  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // ---- 创建面板 DOM ----
  const gridEl = document.getElementById('grid');
  THEMES.forEach(function(theme, idx) {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.style.setProperty('--glow-color', theme.glow);

    const canvasId = 'canvas-' + theme.id;
    const canvasDiv = document.createElement('div');
    canvasDiv.id = canvasId;
    panel.appendChild(canvasDiv);

    const label = document.createElement('div');
    label.className = 'label';
    label.innerHTML = '<span class="dot"></span>' + theme.name +
      '<span class="theme-id">' + theme.id + '</span>';
    panel.appendChild(label);

    gridEl.appendChild(panel);

    // ---- 为每个主题创建 p5 实例 ----
    new p5(function(p) {
      let particles = [];
      const W = 300;
      const H = 280;

      // ---- 粒子类 ----
      class Particle {
        constructor() {
          this.reset();
        }

        /** 初始化/重置粒子状态 */
        reset() {
          this.x = p.random(W);
          this.y = p.random(H);
          this.baseSize = p.random(theme.sizeRange[0], theme.sizeRange[1]);
          this.size = this.baseSize;
          this.colorIdx = p.floor(p.random(theme.colors.length));
          this.life = p.random(0.6, 1.0);
          this.maxLife = this.life;
          this.angle = p.random(p.TWO_PI);
          this.rotSpeed = p.random(-0.03, 0.03);
          this.phase = p.random(p.TWO_PI);
          this.shapeType = p.floor(p.random(4)); // 用于几何变形
          this.prevX = this.x;
          this.prevY = this.y;
          this.trailPoints = [];
        }

        /** 更新粒子位置与状态 */
        update() {
          this.prevX = this.x;
          this.prevY = this.y;

          // 流场驱动
          const n = p.noise(this.x * theme.noiseScale, this.y * theme.noiseScale, p.frameCount * 0.003);
          const angle = n * p.TWO_PI * 2;
          const vx = p.cos(angle) * theme.speed;
          const vy = p.sin(angle) * theme.speed;

          // 各主题特殊运动
          this.applyThemeMotion(vx, vy);

          // 边界处理：超出范围则重置
          if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) {
            this.reset();
          }

          // 生命周期衰减
          this.life -= 0.002;
          if (this.life <= 0) {
            this.reset();
          }

          // 脉冲大小变化
          this.size = this.baseSize * (0.8 + 0.4 * p.sin(p.frameCount * 0.05 + this.phase));

          // 旋转
          this.angle += this.rotSpeed;

          // 记录轨迹点
          this.trailPoints.push({ x: this.x, y: this.y });
          if (this.trailPoints.length > 8) {
            this.trailPoints.shift();
          }
        }

        /** 各主题特殊运动逻辑 */
        applyThemeMotion(vx, vy) {
          const t = p.frameCount * 0.01;
          switch (theme.id) {
            case 'outfit-traditional':
              // 向上飘动 + 轻柔摇摆（如升起的灯笼）
              this.x += vx * 0.5 + p.sin(t + this.phase) * 0.3;
              this.y += -theme.speed * 0.8 + vy * 0.2;
              break;

            case 'outfit-modern':
              // 从中心爆发后向下飘落
              this.x += vx;
              this.y += vy + 0.3;
              break;

            case 'outfit-solar':
              // 螺旋下降（如落花）
              this.x += vx * 0.6 + p.cos(t + this.phase) * 0.4;
              this.y += theme.speed * 0.5 + p.sin(t + this.phase) * 0.2;
              break;

            case 'outfit-season':
              // 水平漂移 + 垂直振荡
              this.x += vx * 0.7 + p.sin(t + this.phase) * 0.5;
              this.y += vy * 0.3 + p.cos(t * 1.5 + this.phase) * 0.4;
              break;

            case 'outfit-weather':
              // 对角下降 + 风效果
              this.x += vx * 0.4 + 0.8;
              this.y += theme.speed * 0.9 + 0.5;
              break;

            case 'outfit-daily':
              // 缓慢上升（如暖空气）
              this.x += vx * 0.3 + p.sin(t * 0.5 + this.phase) * 0.2;
              this.y += -theme.speed * 0.6 + vy * 0.1;
              break;

            case 'corgi-posture':
              // 弹跳式运动
              this.x += vx * 0.6 + p.sin(t * 2 + this.phase) * 0.8;
              this.y += -p.abs(p.sin(t * 3 + this.phase)) * theme.speed * 0.8 + 0.2;
              break;

            case 'corgi-expression':
              // 上浮 + 轻微摆动
              this.x += vx * 0.3 + p.sin(t + this.phase) * 0.5;
              this.y += -theme.speed * 0.5 + p.cos(t * 0.8 + this.phase) * 0.3;
              break;

            case 'corgi-emotion':
              // 从中心辐射 + 情感脉冲
              const cx = W / 2, cy = H / 2;
              const dx = this.x - cx, dy = this.y - cy;
              const dist = p.sqrt(dx * dx + dy * dy) + 0.01;
              const pulse = 0.5 + 0.5 * p.sin(t * 2);
              this.x += (dx / dist) * theme.speed * pulse * 0.5 + vx * 0.3;
              this.y += (dy / dist) * theme.speed * pulse * 0.5 + vy * 0.3;
              break;

            case 'corgi-growth':
              // 向上生长运动
              this.x += vx * 0.2 + p.sin(t * 0.3 + this.phase) * 0.15;
              this.y += -theme.speed * 0.4 + vy * 0.1;
              break;

            case 'corgi-achievement':
              // 向上闪耀
              this.x += vx * 0.5 + p.sin(t * 1.5 + this.phase) * 0.6;
              this.y += -theme.speed * 0.7 + p.cos(t + this.phase) * 0.3;
              break;

            default:
              this.x += vx;
              this.y += vy;
          }
        }

        /** 绘制粒子轨迹 */
        drawTrail() {
          if (theme.trail === 'none' || this.trailPoints.length < 2) return;
          const col = theme.colors[this.colorIdx];
          const lifeRatio = this.life / this.maxLife;

          switch (theme.trail) {
            case 'glow':
              // 柔和发光拖尾
              for (let i = 1; i < this.trailPoints.length; i++) {
                const alpha = (i / this.trailPoints.length) * 0.3 * lifeRatio;
                p.stroke(hexToRgba(col, alpha));
                p.strokeWeight(this.size * 0.5 * (i / this.trailPoints.length));
                p.line(this.trailPoints[i - 1].x, this.trailPoints[i - 1].y,
                       this.trailPoints[i].x, this.trailPoints[i].y);
              }
              break;

            case 'sparkle':
              // 闪烁拖尾
              for (let i = 0; i < this.trailPoints.length; i += 2) {
                const alpha = (i / this.trailPoints.length) * 0.4 * lifeRatio;
                const sz = this.size * 0.3 * (i / this.trailPoints.length);
                p.noStroke();
                p.fill(hexToRgba(col, alpha));
                p.ellipse(this.trailPoints[i].x, this.trailPoints[i].y, sz, sz);
              }
              break;

            case 'petal':
              // 花瓣轮廓拖尾
              p.noFill();
              for (let i = 1; i < this.trailPoints.length; i++) {
                const alpha = (i / this.trailPoints.length) * 0.2 * lifeRatio;
                p.stroke(hexToRgba(col, alpha));
                p.strokeWeight(1);
                p.ellipse(this.trailPoints[i].x, this.trailPoints[i].y,
                          this.size * 0.5, this.size * 0.3);
              }
              break;

            case 'wispy':
              // 轻盈飘渺拖尾
              p.noFill();
              for (let i = 1; i < this.trailPoints.length; i++) {
                const alpha = (i / this.trailPoints.length) * 0.15 * lifeRatio;
                p.stroke(hexToRgba(col, alpha));
                p.strokeWeight(this.size * 0.2);
                p.line(this.trailPoints[i - 1].x, this.trailPoints[i - 1].y,
                       this.trailPoints[i].x, this.trailPoints[i].y);
              }
              break;

            case 'streak':
              // 条纹拖尾（高速时）
              const speed = p.dist(this.prevX, this.prevY, this.x, this.y);
              if (speed > 1) {
                const alpha = 0.3 * lifeRatio;
                p.stroke(hexToRgba(col, alpha));
                p.strokeWeight(this.size * 0.4);
                p.line(this.prevX, this.prevY, this.x, this.y);
              }
              break;

            case 'dotted':
              // 点状拖尾
              for (let i = 0; i < this.trailPoints.length; i += 2) {
                const alpha = (i / this.trailPoints.length) * 0.35 * lifeRatio;
                p.noStroke();
                p.fill(hexToRgba(col, alpha));
                p.ellipse(this.trailPoints[i].x, this.trailPoints[i].y, 2, 2);
              }
              break;

            case 'heart':
              // 心形轮廓拖尾
              p.noFill();
              for (let i = 1; i < this.trailPoints.length; i += 2) {
                const alpha = (i / this.trailPoints.length) * 0.2 * lifeRatio;
                p.stroke(hexToRgba(col, alpha));
                p.strokeWeight(0.8);
                drawHeart(p, this.trailPoints[i].x, this.trailPoints[i].y, this.size * 0.25);
              }
              break;

            case 'ring':
              // 扩展环形拖尾
              for (let i = 0; i < this.trailPoints.length; i += 2) {
                const alpha = (i / this.trailPoints.length) * 0.15 * lifeRatio;
                const ringSize = this.size * (1 + (this.trailPoints.length - i) * 0.3);
                p.noFill();
                p.stroke(hexToRgba(col, alpha));
                p.strokeWeight(0.8);
                p.ellipse(this.trailPoints[i].x, this.trailPoints[i].y, ringSize, ringSize);
              }
              break;

            case 'line':
              // 生长线拖尾
              if (this.trailPoints.length >= 2) {
                const alpha = 0.25 * lifeRatio;
                p.stroke(hexToRgba(col, alpha));
                p.strokeWeight(1.5);
                p.noFill();
                p.beginShape();
                for (let i = 0; i < this.trailPoints.length; i++) {
                  p.vertex(this.trailPoints[i].x, this.trailPoints[i].y);
                }
                p.endShape();
              }
              break;
          }
        }

        /** 绘制粒子主体 */
        draw() {
          const col = theme.colors[this.colorIdx];
          const lifeRatio = this.life / this.maxLife;

          // 先绘制轨迹
          this.drawTrail();

          p.push();
          p.translate(this.x, this.y);
          p.rotate(this.angle);

          switch (theme.id) {
            case 'outfit-traditional':
              // 发光球体，脉冲扩展（如灯笼光）
              drawGlowOrb(p, col, this.size, lifeRatio);
              break;

            case 'outfit-modern':
              // 纸屑几何形状（三角形、方形翻滚）
              drawConfetti(p, col, this.size, lifeRatio, this.shapeType);
              break;

            case 'outfit-solar':
              // 花瓣状有机形态，缓慢旋转
              drawPetal(p, col, this.size, lifeRatio);
              break;

            case 'outfit-season':
              // 季节变形（圆→星→叶→雪花）
              drawSeasonalShape(p, col, this.size, lifeRatio, this.shapeType);
              break;

            case 'outfit-weather':
              // 水滴形（快速时拉伸，慢速时圆形）
              drawDroplet(p, col, this.size, lifeRatio, this.prevX, this.prevY, this.x, this.y);
              break;

            case 'outfit-daily':
              // 柔和散景圆（不同透明度）
              drawBokeh(p, col, this.size, lifeRatio);
              break;

            case 'corgi-posture':
              // 爪印状簇（4个小圆排列）
              drawPawPrint(p, col, this.size, lifeRatio);
              break;

            case 'corgi-expression':
              // 心形脉冲
              drawHeart(p, 0, 0, this.size * 0.6);
              p.noStroke();
              p.fill(hexToRgba(col, 0.7 * lifeRatio));
              drawHeartFill(p, 0, 0, this.size * 0.6);
              break;

            case 'corgi-emotion':
              // 星爆形状，扩展收缩
              drawStarBurst(p, col, this.size, lifeRatio);
              break;

            case 'corgi-growth':
              // 种子→嫩芽→叶子变形
              drawGrowthForm(p, col, this.size, lifeRatio, this.shapeType);
              break;

            case 'corgi-achievement':
              // 奖牌/奖杯几何（五角星、五边形）
              drawMedal(p, col, this.size, lifeRatio, this.shapeType);
              break;
          }

          p.pop();
        }
      }

      // ========== 各主题粒子绘制函数 ==========

      /** 发光球体（传统节日 - 灯笼光） */
      function drawGlowOrb(p, col, size, lifeRatio) {
        const glowSize = size * 1.8;
        // 外层光晕
        p.noStroke();
        p.fill(hexToRgba(col, 0.15 * lifeRatio));
        p.ellipse(0, 0, glowSize, glowSize);
        // 内层
        p.fill(hexToRgba(col, 0.5 * lifeRatio));
        p.ellipse(0, 0, size, size);
        // 核心
        p.fill(hexToRgba('#FFFFFF', 0.4 * lifeRatio));
        p.ellipse(0, 0, size * 0.4, size * 0.4);
      }

      /** 纸屑几何（现代节日） */
      function drawConfetti(p, col, size, lifeRatio, shapeType) {
        p.noStroke();
        p.fill(hexToRgba(col, 0.8 * lifeRatio));
        if (shapeType % 2 === 0) {
          // 三角形
          p.triangle(-size / 2, size / 3, size / 2, size / 3, 0, -size / 2);
        } else {
          // 方形
          p.rectMode(p.CENTER);
          p.rect(0, 0, size, size * 0.6);
        }
      }

      /** 花瓣形态（节气） */
      function drawPetal(p, col, size, lifeRatio) {
        p.noStroke();
        p.fill(hexToRgba(col, 0.6 * lifeRatio));
        p.beginShape();
        for (let a = 0; a < p.TWO_PI; a += 0.1) {
          const r = size * 0.5 * (1 + 0.3 * p.sin(a * 3));
          p.vertex(p.cos(a) * r, p.sin(a) * r);
        }
        p.endShape(p.CLOSE);
      }

      /** 季节变形（季节） */
      function drawSeasonalShape(p, col, size, lifeRatio, shapeType) {
        p.noStroke();
        p.fill(hexToRgba(col, 0.7 * lifeRatio));
        switch (shapeType % 4) {
          case 0: // 圆形（春）
            p.ellipse(0, 0, size, size);
            break;
          case 1: // 星形（夏）
            drawStar(p, 0, 0, size * 0.25, size * 0.5, 5);
            break;
          case 2: // 叶形（秋）
            p.beginShape();
            p.vertex(0, -size / 2);
            p.bezierVertex(size / 2, -size / 4, size / 2, size / 4, 0, size / 2);
            p.bezierVertex(-size / 2, size / 4, -size / 2, -size / 4, 0, -size / 2);
            p.endShape(p.CLOSE);
            break;
          case 3: // 雪花形（冬）
            p.stroke(hexToRgba(col, 0.7 * lifeRatio));
            p.strokeWeight(1.2);
            for (let i = 0; i < 6; i++) {
              const a = (p.TWO_PI / 6) * i;
              p.line(0, 0, p.cos(a) * size * 0.5, p.sin(a) * size * 0.5);
            }
            break;
        }
      }

      /** 水滴形（天气） */
      function drawDroplet(p, col, size, lifeRatio, px, py, cx, cy) {
        const speed = p.dist(px, py, cx, cy);
        const stretch = p.map(speed, 0, 5, 1, 2.5, true);
        p.noStroke();
        p.fill(hexToRgba(col, 0.7 * lifeRatio));
        p.ellipse(0, 0, size * 0.6, size * stretch);
      }

      /** 散景圆（日常） */
      function drawBokeh(p, col, size, lifeRatio) {
        p.noStroke();
        // 外层柔光
        p.fill(hexToRgba(col, 0.12 * lifeRatio));
        p.ellipse(0, 0, size * 1.5, size * 1.5);
        // 主体
        p.fill(hexToRgba(col, 0.35 * lifeRatio));
        p.ellipse(0, 0, size, size);
        // 边缘高光
        p.noFill();
        p.stroke(hexToRgba(col, 0.4 * lifeRatio));
        p.strokeWeight(1);
        p.ellipse(0, 0, size, size);
      }

      /** 爪印簇（柯基姿态） */
      function drawPawPrint(p, col, size, lifeRatio) {
        p.noStroke();
        p.fill(hexToRgba(col, 0.7 * lifeRatio));
        const s = size * 0.25;
        // 掌心
        p.ellipse(0, s * 0.8, s * 2, s * 1.8);
        // 四个趾
        p.ellipse(-s * 1.1, -s * 0.3, s, s);
        p.ellipse(-s * 0.35, -s * 1, s, s);
        p.ellipse(s * 0.35, -s * 1, s, s);
        p.ellipse(s * 1.1, -s * 0.3, s, s);
      }

      /** 心形轮廓绘制（无填充） */
      function drawHeart(p, x, y, size) {
        p.beginShape();
        p.vertex(x, y + size * 0.3);
        p.bezierVertex(x, y - size * 0.1, x - size * 0.6, y - size * 0.4, x - size * 0.6, y - size * 0.1);
        p.bezierVertex(x - size * 0.6, y + size * 0.2, x, y + size * 0.5, x, y + size * 0.7);
        p.bezierVertex(x, y + size * 0.5, x + size * 0.6, y + size * 0.2, x + size * 0.6, y - size * 0.1);
        p.bezierVertex(x + size * 0.6, y - size * 0.4, x, y - size * 0.1, x, y + size * 0.3);
        p.endShape(p.CLOSE);
      }

      /** 心形填充绘制 */
      function drawHeartFill(p, x, y, size) {
        p.beginShape();
        p.vertex(x, y + size * 0.3);
        p.bezierVertex(x, y - size * 0.1, x - size * 0.6, y - size * 0.4, x - size * 0.6, y - size * 0.1);
        p.bezierVertex(x - size * 0.6, y + size * 0.2, x, y + size * 0.5, x, y + size * 0.7);
        p.bezierVertex(x, y + size * 0.5, x + size * 0.6, y + size * 0.2, x + size * 0.6, y - size * 0.1);
        p.bezierVertex(x + size * 0.6, y - size * 0.4, x, y - size * 0.1, x, y + size * 0.3);
        p.endShape(p.CLOSE);
      }

      /** 星爆形状（柯基情绪） */
      function drawStarBurst(p, col, size, lifeRatio) {
        const pulse = 0.8 + 0.3 * p.sin(p.frameCount * 0.08);
        p.noStroke();
        p.fill(hexToRgba(col, 0.6 * lifeRatio));
        drawStar(p, 0, 0, size * 0.25 * pulse, size * 0.55 * pulse, 8);
        // 中心亮点
        p.fill(hexToRgba('#FFFFFF', 0.3 * lifeRatio));
        p.ellipse(0, 0, size * 0.2, size * 0.2);
      }

      /** 生长变形（柯基成长） */
      function drawGrowthForm(p, col, size, lifeRatio, shapeType) {
        p.noStroke();
        p.fill(hexToRgba(col, 0.65 * lifeRatio));
        switch (shapeType % 3) {
          case 0: // 种子
            p.ellipse(0, 0, size * 0.5, size * 0.7);
            break;
          case 1: // 嫩芽
            p.ellipse(0, size * 0.15, size * 0.3, size * 0.5);
            p.ellipse(-size * 0.15, -size * 0.1, size * 0.35, size * 0.2);
            p.ellipse(size * 0.15, -size * 0.15, size * 0.3, size * 0.18);
            break;
          case 2: // 叶子
            p.beginShape();
            p.vertex(0, -size * 0.5);
            p.bezierVertex(size * 0.4, -size * 0.2, size * 0.4, size * 0.2, 0, size * 0.5);
            p.bezierVertex(-size * 0.4, size * 0.2, -size * 0.4, -size * 0.2, 0, -size * 0.5);
            p.endShape(p.CLOSE);
            // 叶脉
            p.stroke(hexToRgba(col, 0.3 * lifeRatio));
            p.strokeWeight(0.6);
            p.line(0, -size * 0.4, 0, size * 0.4);
            break;
        }
      }

      /** 奖牌几何（柯基成就） */
      function drawMedal(p, col, size, lifeRatio, shapeType) {
        p.noStroke();
        p.fill(hexToRgba(col, 0.75 * lifeRatio));
        if (shapeType % 2 === 0) {
          // 五角星
          drawStar(p, 0, 0, size * 0.25, size * 0.55, 5);
        } else {
          // 五边形
          drawPolygon(p, 0, 0, size * 0.45, 5);
        }
        // 高光
        p.fill(hexToRgba('#FFFFFF', 0.25 * lifeRatio));
        p.ellipse(-size * 0.08, -size * 0.1, size * 0.2, size * 0.15);
      }

      /** 通用星形绘制 */
      function drawStar(p, x, y, r1, r2, npoints) {
        const angle = p.TWO_PI / npoints;
        const halfAngle = angle / 2.0;
        p.beginShape();
        for (let a = -p.HALF_PI; a < p.TWO_PI - p.HALF_PI; a += angle) {
          p.vertex(x + p.cos(a) * r2, y + p.sin(a) * r2);
          p.vertex(x + p.cos(a + halfAngle) * r1, y + p.sin(a + halfAngle) * r1);
        }
        p.endShape(p.CLOSE);
      }

      /** 通用正多边形绘制 */
      function drawPolygon(p, x, y, r, n) {
        p.beginShape();
        for (let i = 0; i < n; i++) {
          const a = (p.TWO_PI / n) * i - p.HALF_PI;
          p.vertex(x + p.cos(a) * r, y + p.sin(a) * r);
        }
        p.endShape(p.CLOSE);
      }

      // ========== p5 生命周期 ==========

      p.setup = function() {
        const canvas = p.createCanvas(W, H);
        canvas.parent(canvasId);
        canvas.style('width', '100%');
        canvas.style('height', '280px');
        p.randomSeed(theme.seed);
        p.noiseSeed(theme.seed);

        // 初始化粒子
        for (let i = 0; i < theme.count; i++) {
          particles.push(new Particle());
        }
      };

      p.draw = function() {
        // 半透明背景实现拖尾效果
        p.background(26, 26, 26, 40);

        // 更新并绘制所有粒子
        for (let i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();
        }
      };

    }, canvasId);
  });
  </script>

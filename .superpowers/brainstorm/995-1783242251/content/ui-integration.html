<h2>UI 集成与数据流</h2>
<p class="subtitle">HomeScreen 中的容器层次与状态流</p>

<div class="section">
  <h3>UI 容器层次（修改后）</h3>
  <div style="background:#fff; padding:24px; border-radius:12px;">
    <svg viewBox="0 0 700 480" style="width:100%; height:auto; font-family: system-ui, sans-serif;">
      <!-- 外层 Box (下拉容器) -->
      <rect x="40" y="20" width="620" height="440" rx="16" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="55" y="45" font-size="13" font-weight="600" fill="#0284c7">Box（下拉容器，Modifier.nestedScroll）</text>

      <!-- 指示器区域 -->
      <rect x="80" y="65" width="540" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="95" y="88" font-size="12" font-weight="600" fill="#92400e">CorgiPullRefreshIndicator</text>
      <text x="95" y="106" font-size="11" fill="#b45309">height = pullOffset.toDp()</text>
      <text x="95" y="122" font-size="11" fill="#b45309">contentAlignment = Center</text>
      <text x="350" y="100" font-size="32" text-anchor="middle">🐕</text>
      <text x="350" y="125" font-size="10" fill="#92400e" text-anchor="middle">奔跑柯基（居中）</text>

      <!-- 空白间隔说明 -->
      <text x="350" y="155" font-size="10" fill="#64748b" text-anchor="middle">↑ 空白区域（高度随 pullOffset 变化）↑</text>

      <!-- Content Box (translationY = pullOffset) -->
      <rect x="80" y="170" width="540" height="280" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,2"/>
      <text x="95" y="192" font-size="12" font-weight="600" fill="#15803d">Box(Modifier.graphicsLayer { translationY = pullOffset })</text>

      <!-- ZonedReorderableLazyColumn -->
      <rect x="100" y="205" width="500" height="235" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
      <text x="115" y="225" font-size="11" font-weight="600" fill="#475569">ZonedReorderableLazyColumn</text>

      <!-- 待办卡片们 -->
      <rect x="115" y="240" width="470" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="125" y="263" font-size="11" fill="#475569">☐ 置顶区</text>

      <rect x="115" y="288" width="470" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="125" y="311" font-size="11" fill="#475569">☐ 待完成区</text>

      <rect x="115" y="336" width="470" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="125" y="359" font-size="11" fill="#475569">✓ 已完成区</text>

      <!-- 向下位移箭头 -->
      <path d="M 620 180 L 620 410" stroke="#22c55e" stroke-width="2" marker-end="url(#downArrow)"/>
      <text x="630" y="280" font-size="10" fill="#22c55e" transform="rotate(90 630 280)">translationY = pullOffset</text>

      <defs>
        <marker id="downArrow" markerWidth="10" markerHeight="10" refX="3" refY="8" orient="auto">
          <path d="M0,0 L6,0 L3,8 z" fill="#22c55e"/>
        </marker>
      </defs>
    </svg>
  </div>
</div>

<div class="section">
  <h3>状态数据流</h3>
  <div style="background:#fff; padding:24px; border-radius:12px;">
    <svg viewBox="0 0 900 280" style="width:100%; height:auto; font-family: system-ui, sans-serif;">
      <!-- 用户手势 -->
      <rect x="20" y="120" width="120" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="80" y="145" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">用户下拉手势</text>
      <text x="80" y="162" font-size="10" fill="#b45309" text-anchor="middle">NestedScroll</text>

      <!-- 箭头 -->
      <path d="M 145 150 L 215 150" stroke="#475569" stroke-width="2" marker-end="url(#arr1)"/>

      <!-- NestedScrollConnection -->
      <rect x="220" y="100" width="180" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
      <text x="310" y="125" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">PullRefreshNested</text>
      <text x="310" y="142" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">ScrollConnection</text>
      <text x="310" y="162" font-size="10" fill="#3b82f6" text-anchor="middle">应用阻尼曲线</text>
      <text x="310" y="178" font-size="10" fill="#3b82f6" text-anchor="middle">更新 pullOffset</text>
      <text x="310" y="194" font-size="10" fill="#3b82f6" text-anchor="middle">更新 state</text>

      <!-- 箭头 -->
      <path d="M 405 150 L 475 150" stroke="#475569" stroke-width="2" marker-end="url(#arr1)"/>

      <!-- 状态持有者 -->
      <rect x="480" y="80" width="160" height="140" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
      <text x="560" y="105" font-size="11" font-weight="600" fill="#9f1239" text-anchor="middle">PullRefreshStateHolder</text>
      <text x="560" y="125" font-size="10" fill="#be185d" text-anchor="middle">pullOffset: Float</text>
      <text x="560" y="142" font-size="10" fill="#be185d" text-anchor="middle">state: PullRefreshState</text>
      <text x="560" y="162" font-size="10" fill="#be185d" text-anchor="middle">= Animatable</text>
      <text x="560" y="185" font-size="10" fill="#be185d" text-anchor="middle">↓ collectAsState</text>

      <!-- 箭头分叉到指示器和内容 -->
      <path d="M 645 130 L 715 100" stroke="#ec4899" stroke-width="2" marker-end="url(#arr2)"/>
      <path d="M 645 170 L 715 200" stroke="#ec4899" stroke-width="2" marker-end="arr2"/>

      <!-- 指示器 -->
      <rect x="720" y="65" width="160" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="800" y="90" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">CorgiPullRefreshIndicator</text>
      <text x="800" y="108" font-size="10" fill="#b45309" text-anchor="middle">height=pullOffset</text>

      <!-- 内容 -->
      <rect x="720" y="175" width="160" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
      <text x="800" y="200" font-size="11" font-weight="600" fill="#15803d" text-anchor="middle">Content Box</text>
      <text x="800" y="218" font-size="10" fill="#16a34a" text-anchor="middle">translationY=pullOffset</text>

      <!-- onRefresh 回调 -->
      <path d="M 310 205 L 310 245 L 560 245 L 560 220" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,2" fill="none" marker-end="url(#arr3)"/>
      <text x="420" y="240" font-size="10" fill="#22c55e">onRefresh()</text>

      <defs>
        <marker id="arr1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
        </marker>
        <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#ec4899"/>
        </marker>
        <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
        </marker>
      </defs>
    </svg>
  </div>
</div>
